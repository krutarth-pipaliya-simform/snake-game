services:
  - type: web
    name: snake-game-backend
    env: node
    plan: free
    rootDir: BackEnd
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: snake-game-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: snake-game-frontend
    env: static
    rootDir: FrontEnd
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_WS_URL
        fromService:
          type: web
          name: snake-game-backend
          envVarKey: RENDER_EXTERNAL_URL
